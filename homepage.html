<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prinime | Stream Anime Online</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-white font-sans">

  <!-- Navbar -->
  <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
    <div class="flex justify-between items-center px-6 py-4">
      <h1 class="font-extrabold text-3xl text-cyan-400 tracking-tight">Prinime</h1>

      <!-- Menu untuk desktop -->
      <div class="hidden md:flex items-center space-x-8">
        <a href="#" class="text-lg font-semibold hover:text-cyan-400 transition duration-300">Home</a>
        <a href="https://github.com/Nagiahmad" class="text-lg font-semibold hover:text-cyan-400 transition duration-300">Category</a>
        <a href="#" class="text-lg font-semibold hover:text-cyan-400 transition duration-300">Search</a>
        <button class="border-2 border-cyan-400 text-cyan-400 px-5 py-2 rounded-md font-bold transition duration-300 hover:bg-cyan-400 hover:text-black hover:shadow-[0_0_20px_#22d3ee]">
          Sign up
        </button>
      </div>

      <!-- Tombol hamburger untuk mobile -->
      <button id="menu-btn" class="md:hidden text-cyan-400 focus:outline-none text-3xl">
        ☰
      </button>
    </div>

    <!-- Menu mobile -->
    <div id="mobile-menu" class="hidden flex-col items-center space-y-4 pb-5 bg-slate-900 md:hidden border-t border-slate-800">
      <a href="#" class="text-lg font-semibold hover:text-cyan-400 transition duration-300">Home</a>
      <a href="https://github.com/Nagiahmad" class="text-lg font-semibold hover:text-cyan-400 transition duration-300">Category</a>
      <a href="#" class="text-lg font-semibold hover:text-cyan-400 transition duration-300">Search</a>
      <button class="border-2 border-cyan-400 text-cyan-400 px-5 py-2 rounded-md font-bold transition duration-300 hover:bg-cyan-400 hover:text-black hover:shadow-[0_0_20px_#22d3ee]">
        Sign up
      </button>
    </div>
  </nav>

  <section class="relative h-screen flex items-center justify-center overflow-hidden">
    <!-- Slideshow Container -->
    <div class="relative z-10 w-[70%] mx-auto rounded-xl overflow-hidden shadow-2xl">
      <div class="slide fade">
        <img src="img/test.jpg" class="w-full h-[400px] object-cover">
        <div class="absolute inset-0 bg-black/50 flex flex-col justify-center items-center text-center px-6">
          <h2 class="text-4xl font-extrabold mb-4">みんなさん、こんにちは</h2>
          <p class="text-gray-300 mb-6">どんな映画をみますか？</p>
          <button class="bg-cyan-400 text-black px-8 py-3 rounded-md font-bold text-lg transition duration-300 hover:bg-cyan-300 hover:shadow-[0_0_30px_#22d3ee]">
            Watch Now
          </button>
        </div>
      </div>

      <div class="slide fade hidden">
        <img src="https://cdn.myanimelist.net/images/anime/1286/99889.jpg" class="w-full h-[400px] object-cover">
        <div class="absolute inset-0 bg-black/50 flex flex-col justify-center items-center text-center px-6">
          <h2 class="text-4xl font-extrabold mb-4">Demon Slayer: Mugen Train</h2>
          <p class="text-gray-300 mb-6">Tanjiro boards the Infinity Train on a dangerous mission.</p>
          <button class="bg-cyan-400 text-black px-8 py-3 rounded-md font-bold text-lg transition duration-300 hover:bg-cyan-300 hover:shadow-[0_0_30px_#22d3ee]">
            Watch Now
          </button>
        </div>
      </div>
      <button id="prev" class="absolute top-1/2 -translate-y-1/2 left-4 bg-black/50 hover:bg-black/70 text-white text-3xl rounded-full p-3 transition">&#10094;</button>
      <button id="next" class="absolute top-1/2 -translate-y-1/2 right-4 bg-black/50 hover:bg-black/70 text-white text-3xl rounded-full p-3 transition">&#10095;</button>
    </div>
  </section>

   <h3 class="text-3xl font-bold mb-6 border-l-4 border-cyan-400 pl-3 m-5">Baru ditambahkan</h3>
  <!-- Content Section -->
  <section class="p-8">
        <div id="movie-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 justify-center"></div>
  </section>

  <footer class="bg-slate-900 text-gray-400 text-center py-6 border-t border-slate-800">
    Prinime
  </footer>



  <script>
    // Toggle mobile menu
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    // Load film from JSON
    fetch('data.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('movie-container');
        data.forEach(film => {
          container.innerHTML += `
            <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-lg hover:scale-105 transition duration-300">
              <img src="${film.poster}" alt="${film.title}" class="w-full h-64 object-cover">
              <div class="p-4">
                <a class="text-xl font-semibold mb-2" href="film.html?id=${film.id}"    >${film.title}</a>
                <p class="text-gray-400 text-sm">${film.description}</p>
              </div>
            </div>
          `;
        });
      })
      .catch(err => console.error("Gagal memuat data:", err));

      // === Slideshow ===
    let slideIndex = 0;
    const slides = document.querySelectorAll('.slide');
    const nextBtn = document.getElementById('next');
    const prevBtn = document.getElementById('prev');

    function showSlide(n) {
      slides.forEach(s => s.classList.add('hidden'));
      slideIndex = (n + slides.length) % slides.length;
      slides[slideIndex].classList.remove('hidden');
      slides[slideIndex].classList.add('fade');
    }

    function nextSlide() {
      showSlide(slideIndex + 1);
    }

    function prevSlide() {
      showSlide(slideIndex - 1);
    }

    // Event listeners
    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    // Auto slideshow
    function autoSlide() {
      nextSlide();
      setTimeout(autoSlide, 5000);
    }
    showSlide(slideIndex);
    setTimeout(autoSlide, 5000);
  </script>
</body>
</html>
